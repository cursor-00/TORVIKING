name: Torrent to VikingFile Uploader

on:
  workflow_dispatch:
    inputs:
      torrent_link:
        description: "Magnet link or direct .torrent URL"
        required: true
        type: string
      viking_user_hash:
        description: "Your VikingFile user hash (leave empty for anonymous)"
        required: false
        type: string
      viking_folder:
        description: "Folder on VikingFile (optional)"
        required: false
        type: string

jobs:
  upload:
    runs-on: windows-latest

    steps:
      - name: Install aria2
        shell: pwsh
        run: |
          Invoke-WebRequest "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip" -OutFile aria2.zip
          Expand-Archive aria2.zip -Force
          Move-Item aria2-* aria2

      - name: Enable UTF-8
        shell: pwsh
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV

      - name: Download and patch uploader
        shell: pwsh
        run: |
          Invoke-WebRequest "https://raw.githubusercontent.com/Hexdare/VikingFile-Upload/main/upload.py" -OutFile upload.py
          
          $content = Get-Content upload.py -Raw

          $patch = "import sys`n" +
                   "import time`n" +
                   "sys.stdout.reconfigure(encoding='utf-8')`n" +
                   "`n" +
                   "def display_progress(uploaded, total, start_time):`n" +
                   "    percent = (uploaded / total) * 100 if total else 0`n" +
                   "    bar_len = 30`n" +
                   "    filled = int(bar_len * uploaded // total) if total else 0`n" +
                   "    bar = '█' * filled + '-' * (bar_len - filled)`n" +
                   "    speed = uploaded / max((time.time() - start_time), 1)`n" +
                   "    speed_mb = speed / 1024 / 1024`n" +
                   "    uploaded_mb = uploaded / 1024 / 1024`n" +
                   "    total_mb = total / 1024 / 1024`n" +
                   "    line = f'[{bar}] {percent:5.1f}% | {uploaded_mb:.1f}/{total_mb:.1f} MB | {speed_mb:.2f} MB/s'`n" +
                   "    print(f'\r{line}', end='', flush=True)`n"

          $content = $patch + "`n`n" + $content
          $content | Set-Content upload.py -Encoding utf8

      - name: Create downloads folder
        shell: pwsh
        run: |
          mkdir downloads -Force | Out-Null

      - name: Download torrent (clean progress)
        shell: pwsh
        run: |
          $link = "${{ github.event.inputs.torrent_link }}"

          .\aria2\aria2c.exe `
            --dir=downloads `
            --seed-time=0 `
            --summary-interval=1 `
            --console-log-level=warn `
            --show-console-readout=true `
            --file-allocation=none `
            --max-connection-per-server=16 `
            --split=16 `
            $link

      - name: Upload files (clean progress)
        shell: pwsh
        run: |
          $userHash = "${{ github.event.inputs.viking_user_hash }}"
          $folder   = "${{ github.event.inputs.viking_folder }}"

          Get-ChildItem downloads -Recurse -File |
            Where-Object { $_.Extension -ne ".aria2" } |
            ForEach-Object {

              Write-Host "`nUploading: $($_.Name)"

              $args = @($_.FullName)
              if ($userHash) { $args += $userHash }
              if ($folder)   { $args += $folder }

              python upload.py @args

              Write-Host "`nDone"
            }
