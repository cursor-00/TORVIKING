name: Torrent to VikingFile Uploader

on:
  workflow_dispatch:
    inputs:
      torrent_link:
        description: "Magnet link or direct .torrent URL"
        required: true
        type: string
      viking_user_hash:
        description: "Your VikingFile user hash (leave empty for anonymous)"
        required: false
        type: string
      viking_folder:
        description: "Folder on VikingFile (optional)"
        required: false
        type: string

jobs:
  upload:
    runs-on: windows-latest

    steps:
      - name: 1. Install aria2
        shell: pwsh
        run: |
          $url = "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip"
          Invoke-WebRequest $url -OutFile aria2.zip
          Expand-Archive aria2.zip -Force
          Move-Item aria2-* aria2

      - name: 2. Enable UTF-8
        shell: pwsh
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV

      - name: 3. Download & patch uploader (silent + clean)
        shell: pwsh
        run: |
          Invoke-WebRequest "https://raw.githubusercontent.com/Hexdare/VikingFile-Upload/main/upload.py" -OutFile upload.py
          
          $content = Get-Content upload.py -Raw

          # Patch: UTF-8 + disable noisy progress
          $patch = @"
import sys
sys.stdout.reconfigure(encoding='utf-8')

# === CLEAN PROGRESS PATCH ===
def display_progress(uploaded, total, start_time):
    percent = (uploaded / total) * 100 if total else 0
    bar_len = 30
    filled = int(bar_len * uploaded // total) if total else 0
    bar = '█' * filled + '-' * (bar_len - filled)

    speed = uploaded / max((time.time() - start_time), 1)
    speed_mb = speed / 1024 / 1024

    uploaded_mb = uploaded / 1024 / 1024
    total_mb = total / 1024 / 1024

    line = f"[{bar}] {percent:5.1f}% | {uploaded_mb:.1f}/{total_mb:.1f} MB | {speed_mb:.2f} MB/s"
    print(f"\r{line}", end="", flush=True)
"@

          $content = $patch + "`n" + $content
          $content | Set-Content upload.py -Encoding utf8

      - name: 4. Prepare folder
        shell: pwsh
        run: |
          mkdir downloads -Force | Out-Null

      - name: 5. Download (clean progress bar)
        shell: pwsh
        run: |
          $link = "${{ github.event.inputs.torrent_link }}"

          .\aria2\aria2c.exe `
            --dir=downloads `
            --seed-time=0 `
            --summary-interval=1 `
            --console-log-level=warn `
            --show-console-readout=true `
            --file-allocation=none `
            --max-connection-per-server=16 `
            --split=16 `
            $link

      - name: 6. Upload (clean progress bar)
        shell: pwsh
        run: |
          $userHash = "${{ github.event.inputs.viking_user_hash }}"
          $folder   = "${{ github.event.inputs.viking_folder }}"

          Get-ChildItem downloads -Recurse -File |
            Where-Object { $_.Extension -ne ".aria2" } |
            ForEach-Object {

              Write-Host "`nUploading: $($_.Name)"

              $args = @($_.FullName)
              if ($userHash) { $args += $userHash }
              if ($folder)   { $args += $folder }

              python upload.py @args

              Write-Host "`nDone."
            }
